name: preview

on: push

env:
  EXPO_PROJECT_OWNER: friedrich.fschr-org

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret with access to the Expo account/org '${EXPO_PROJECT_OWNER}' in this repo's secrets. Learn more: https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi

      - name: Verify Expo owner
        run: |
          OWNER=$(node -p "require('./app.json').expo.owner")
          if [ "$OWNER" != "$EXPO_PROJECT_OWNER" ]; then
            echo "app.json owner '$OWNER' does not match expected owner '$EXPO_PROJECT_OWNER'."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Create preview
        uses: expo/expo-github-action/preview@v8
        with:
          command: eas update --auto --non-interactive
